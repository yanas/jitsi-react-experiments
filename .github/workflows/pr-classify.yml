name: PR Classification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Collect PR context
        id: context
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          DIFF_STAT=$(git diff "origin/$BASE_REF"...HEAD --stat 2>/dev/null || echo "Unable to compute diff stat")
          CHANGED_FILES=$(git diff "origin/$BASE_REF"...HEAD --name-only 2>/dev/null || echo "")
          echo "$DIFF_STAT" > /tmp/diff_stat.txt
          echo "$CHANGED_FILES" > /tmp/changed_files.txt

      - name: Classify PR
        id: classifier
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        with:
          model: claude-haiku-4-5-20251001
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are classifying a pull request for jitsi-meet, an open-source WebRTC
            video conferencing platform built with React/Redux for web and React Native for mobile.

            PR Title: ${{ github.event.pull_request.title }}
            PR Body: ${{ github.event.pull_request.body }}

            Changed files:
            $(cat /tmp/changed_files.txt)

            Diff stat:
            $(cat /tmp/diff_stat.txt)

            Platform hints for changed files:
            - Files in android/, *.android.ts → platform: android
            - Files in ios/, *.ios.ts → platform: ios
            - Files matching *.native.ts or in react-native-sdk/ → platform: native
            - Files matching *.web.ts, *.web.tsx, css/, webpack.config.js, modules/ → platform: web
            - Files matching *.any.ts or in react/features/ with no platform suffix → could be multiple platforms

            Based ONLY on the PR title, body, and changed files listed above, respond with ONLY
            valid JSON (no explanation, no markdown fences):
            {
              "type": "<feature|fix|chore|refactor|language|documentation|test|security>",
              "platforms": ["<web|android|ios|native>"],
              "summary": "<1-2 sentence plain English summary of what this PR does>"
            }

      - name: Apply labels
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            const validTypes = ['feature', 'fix', 'chore', 'refactor', 'language', 'documentation', 'test', 'security'];
            const validPlatforms = ['web', 'android', 'ios', 'native'];

            // Read the JSON posted as a comment by claude-code-action
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const botComment = comments.data
              .reverse()
              .find(c => c.user.login === 'github-actions[bot]' && c.body.includes('"type"'));

            let typeLabel = null;
            let platformLabels = [];

            if (botComment) {
              try {
                const match = botComment.body.match(/\{[\s\S]*\}/);
                if (match) {
                  const parsed = JSON.parse(match[0]);
                  if (validTypes.includes(parsed.type)) typeLabel = parsed.type;
                  if (Array.isArray(parsed.platforms)) {
                    platformLabels = parsed.platforms.filter(p => validPlatforms.includes(p));
                  }
                }
              } catch (e) {
                core.warning(`Failed to parse classifier output: ${e.message}`);
              }

              // Delete the raw JSON comment
              await github.rest.issues.deleteComment({ owner, repo, comment_id: botComment.id });
            }

            // Remove old type/platform labels
            const existingLabels = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const toRemove = existingLabels.data
              .filter(l => validTypes.includes(l.name) || validPlatforms.includes(l.name))
              .map(l => l.name);
            for (const label of toRemove) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
              } catch (e) {}
            }

            // Apply new labels
            const labelsToAdd = [typeLabel, ...platformLabels].filter(Boolean);
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: labelsToAdd });
            }
